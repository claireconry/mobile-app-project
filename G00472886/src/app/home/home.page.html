<ion-header>
  <ion-toolbar>
    <ion-title>G00472886</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/favourites">
        <ion-icon name="heart"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-toolbar>
    <ion-searchbar [(ngModel)]="searchQuery" placeholder="Search movies..."></ion-searchbar>
    <ion-buttons slot="end">
      <ion-button (click)="searchMovies()">Search</ion-button>
    </ion-buttons>
  </ion-toolbar>

  <ion-list>
    <ion-item *ngFor="let movie of movies" (click)="goToMovieDetails(movie)">
      <img [src]="'https://image.tmdb.org/t/p/w92' + movie.poster_path" slot="start">
      <ion-label>{{ movie.title }}</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
