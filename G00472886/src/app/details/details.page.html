<ion-header>
  <ion-toolbar>
    <ion-title>Details</ion-title>
    <ion-buttons slot="start">
      <ion-button routerLink="/home">
        <ion-icon name="home"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button routerLink="/favourites">
        <ion-icon name="heart"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div *ngIf="person">
    <img *ngIf="person.profile_path" [src]="'https://image.tmdb.org/t/p/w200' + person.profile_path">
    <p *ngIf="!person.profile_path">No image</p>

    <h2>{{ person.name }}</h2>
    <p *ngIf="person.birthday">DOB: {{ person.birthday }}</p>
    <p *ngIf="person.deathday">DOD: {{ person.deathday }}</p>
    <p *ngIf="person.also_known_as?.length > 0">AKA: {{ person.also_known_as.join(', ') }}</p>
    <p *ngIf="person.biography">{{ person.biography }}</p>

    <h3>Other Movies</h3>
    <ion-list>
      <ion-item *ngFor="let movie of movies" (click)="goToMovieDetails(movie)">
        <img *ngIf="movie.poster_path" [src]="'https://image.tmdb.org/t/p/w92' + movie.poster_path" slot="start">
        <ion-label>{{ movie.title }}</ion-label>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
